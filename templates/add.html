<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Νέο Ραντεβού</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    padding: 20px;
}

form {
    background: white;
    padding: 20px;
    border-radius: 12px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 15px;
    background: #111;
    color: white;
    border: none;
    border-radius: 10px;
}
</style>
</head>

<body>

<h2>➕ Νέο Ραντεβού</h2>

<form method="POST">

<input name="name" placeholder="Όνομα" required>
<input name="phone" placeholder="Τηλέφωνο" required>

<input type="time" name="start_time" required>

<select name="duration">
    <option value="20">20 λεπτά</option>
    <option value="30">30 λεπτά</option>
    <option value="45">45 λεπτά</option>
</select>

<select name="service">
    <option>Κούρεμα</option>
    <option>Fade</option>
    <option>Ξύρισμα</option>
</select>

<button type="submit">Αποθήκευση</button>

</form>

</body>
</html>

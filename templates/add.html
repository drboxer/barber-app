<!DOCTYPE html>
<html lang="el">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Νέο Ραντεβού</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
    padding:20px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.back-btn{
    background:#1f1f1f;
    color:white;
    padding:10px 14px;
    border-radius:10px;
    text-decoration:none;
    border:1px solid #333;
    font-size:14px;
    font-weight:bold;
}

h2{
    margin:0;
}

form{
    background:#1a1a1a;
    padding:22px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.35);
}

label{
    display:block;
    margin-top:18px;
    margin-bottom:8px;
    color:#d4af37;
    font-weight:bold;
}

input,
select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#2a2a2a;
    color:white;
    font-size:16px;
    box-sizing:border-box;
}

input:focus,
select:focus{
    outline:none;
    border:2px solid #d4af37;
}

button{
    width:100%;
    margin-top:28px;
    padding:16px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#d4af37,#f5d76e);
    color:black;
    font-size:17px;
    font-weight:bold;
}

.toast-container{

    position:fixed;

    top:20px;
    right:20px;

    z-index:9999;
}

.toast{

    background:#1f1f1f;
    color:white;

    padding:14px 18px;

    border-radius:14px;

    margin-bottom:10px;

    box-shadow:0 5px 15px rgba(0,0,0,0.3);

    animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(-10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}
.live-toast{

    position:fixed;

    top:20px;
    right:20px;

    background:#1f1f1f;
    color:white;

    padding:14px 18px;

    border-radius:14px;

    opacity:0;

    transition:all 0.3s ease;

    z-index:9999;
}
</style>

</head>

<body>

<div class="topbar">

<a href="/calendar" class="back-btn">
← Calendar
</a>

<h2>➕ Νέο Ραντεβού</h2>

</div>

<form method="POST">

<label>Πελάτης</label>
<input type="text" name="name" id="name" required>

<label>Τηλέφωνο</label>
<input type="text" name="phone" id="phone" required>
<label>Ημερομηνία</label>
<input type="date" name="date" value="{{ selected_date }}" required>
<label>Ώρα</label>
<input type="time" name="start_time"
value="{{ selected_time }}" required>

<label>Διάρκεια</label>

<select name="duration">

<option value="20">20 λεπτά</option>
<option value="30">30 λεπτά</option>
<option value="45">45 λεπτά</option>
<option value="60">60 λεπτά</option>

</select>

<label>Υπηρεσία</label>

<select name="service">

<option>Κούρεμα</option>
<option>Fade</option>
<option>Ξύρισμα</option>
<option>Παιδικό</option>

</select>

<button type="submit">
💾 Αποθήκευση Ραντεβού
</button>

</form>
<div id="liveToast" class="live-toast"></div>
<div id="liveToast" class="live-toast"></div>

<script>

const phoneInput =
    document.getElementById("phone");

const nameInput =
    document.getElementById("name");

const toast =
    document.getElementById("liveToast");

let lastPhone = "";

function showToast(message){

    toast.innerText = message;

    toast.style.opacity = "1";

    toast.style.transform = "translateY(0)";

    clearTimeout(window.toastTimeout);

    window.toastTimeout = setTimeout(() => {

        toast.style.opacity = "0";

        toast.style.transform =
            "translateY(-10px)";

    }, 3000);
}

phoneInput.addEventListener("input", async function(){

    const phone = this.value;

    if(phone.length < 3){
        return;
    }

    if(phone === lastPhone){
        return;
    }

    lastPhone = phone;

    try {

        const response =
            await fetch(
                "/search_customer?phone=" + phone
            );

        const data =
            await response.json();

        if(data.name){

            nameInput.value = data.name;

            if(data.notes){

                showToast(
                    "📝 " + data.notes
                );

            } else {

                showToast(
                    "👤 Υπάρχων πελάτης"
                );
            }

        } else {

            showToast(
                "✅ Νέος πελάτης"
            );
        }

    } catch(err){

        console.log(err);
    }

});

</script>
</body>
</html>

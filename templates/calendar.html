<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/html">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<style>
body{
    font-family:Arial;
    margin:0;
    padding:15px;
    background:#0f0f0f;
    color:white;
}

#calendar{
    background:#1a1a1a;
    padding:10px;
    border-radius:18px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.fc{
    color:white;
}

.fc-toolbar-title{
    color:white;
}

.fc-button{
    background:#2a2a2a !important;
    border:none !important;
    border-radius:10px !important;
}

.fc-button:hover{
    background:#3a3a3a !important;
}

.fc-timegrid-slot{
    border-color:#2c2c2c !important;
}

.fc-col-header-cell{
    background:#161616;
}


.fc-event{

    min-height:45px;

    padding:4px 6px;

    border:none;

    border-radius:10px;

    font-size:13px;

    font-weight:600;
}

.fc-theme-standard td,
.fc-theme-standard th{
    border-color:#2c2c2c;
}

.topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:20px;
}

.dashboard-btn{
    background:#1f1f1f;
    color:white;
    padding:10px 14px;
    border-radius:10px;
    text-decoration:none;
    font-size:14px;
    font-weight:bold;
    border:1px solid #333;
}

.toast-container{

    position:fixed;

    top:20px;
    right:20px;

    z-index:9999;
}

.toast{

    background:#1f1f1f;
    color:white;

    padding:14px 18px;

    border-radius:14px;

    margin-bottom:10px;

    box-shadow:0 5px 15px rgba(0,0,0,0.3);

    transition:all 0.3s ease;
}
</style>

</head>

<body>

<div class="topbar">

<a href="/" class="dashboard-btn">
🏠 Dashboard
</a>

<h2>📅 Barber Calendar</h2>

</div>

<div id="calendar"></div>

<script>

document.addEventListener('DOMContentLoaded', function() {

    var calendarEl = document.getElementById('calendar');

    var calendar = new FullCalendar.Calendar(calendarEl, {

    locale: 'el',

    initialView: 'timeGridDay',
    selectable: true,

    timeZone: 'local',

    slotMinTime: "07:00:00",
    slotMaxTime: "22:00:00",

    slotDuration: "00:15:00",

    slotLabelInterval: "00:30",

    expandRows: true,

    displayEventEnd: false,

    contentHeight: "auto",

    height: "auto",

    aspectRatio: 1.2,

    nowIndicator: true,

    allDaySlot: false,

    eventDisplay: 'block',

    headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'timeGridDay,timeGridWeek'
    },
    eventClick: function(info) {

    openModal(info.event.id);

},
    editable: true,
    eventDrop: function(info) {

    const eventId = info.event.id;

    const newStart = info.event.start
        .toTimeString()
        .substring(0,5);

    fetch("/move_appointment", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            id: eventId,
            start_time: newStart
        })

    });

    },
    eventDurationEditable: true,
    eventResize: function(info) {

    const eventId = info.event.id;

    const start = info.event.start;
    const end = info.event.end;

    const durationMinutes = (end - start) / 60000;

    fetch("/resize_appointment", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            id: eventId,
            duration: durationMinutes
        })

    });

},

    dateClick: function(info) {

        const selectedTime = info.dateStr.substring(11,16);
        const selectedDate = info.dateStr.substring(0,10);

        window.location.href = "/add?date=" + selectedDate +
        "&time=" + selectedTime;
    },

    events: {{ events|tojson }}

});
calendar.render();
});

</script>

<div id="eventModal" style="
display:none;
position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.7);

z-index:99999;
">

<div style="
background:#1b1b1b;
padding:20px;
border-radius:16px;
width:300px;
margin:auto;
text-align:center;
">

<h3>Update Appointment</h3>

<button onclick="updateStatus('completed')">
✔ Completed
</button>

<button onclick="updateStatus('cancelled')">
✖ Cancelled
</button>

<button onclick="updateStatus('no_show')">
⚫ No-show
</button>

<br><br>

<button onclick="closeModal()">
Close
</button>

</div>
</div>
<script>

let selectedEventId = null;

function openModal(id){

    selectedEventId = id;

    const modal =
        document.getElementById("eventModal");

    modal.style.display = "flex";

    modal.style.alignItems = "center";

    modal.style.justifyContent = "center";
}

function closeModal(){
    document.getElementById("eventModal").style.display = "none";
}

function updateStatus(status){

    fetch("/appointment/" + selectedEventId + "/status", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ status: status })
    }).then(() => {

        closeModal();
        location.reload();

    });

}

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="el">

<head>
<meta charset="UTF-8">
<title>Customer</title>

<style>

body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    padding:20px;
}

.card{
    background:#1b1b1b;
    padding:20px;
    border-radius:16px;
    margin-bottom:15px;
}

</style>

</head>

<body>

<div class="card">

<h2>👤 {{ customer[1] }}</h2>

<p>📞 {{ customer[2] }}</p>

<p>📝 {{ customer[3] if customer[3] else "No notes" }}</p>

<p>📅 Joined: {{ customer[4] }}</p>

</div>

<div class="card">

<h3>📅 History</h3>

{% if history %}

    {% for h in history %}

        <p>
        {{ h[0] }} • {{ h[1] }} • {{ h[2] }}
        </p>

    {% endfor %}

{% else %}

    <p>No appointments yet</p>

{% endif %}

</div>

</body>
</html>

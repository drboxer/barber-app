<!DOCTYPE html>
<html lang="el">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;
}

.card{

    background:#1b1b1b;

    padding:30px;

    border-radius:18px;

    width:320px;
}

input{

    width:100%;

    padding:14px;

    margin-top:12px;

    border:none;

    border-radius:12px;

    background:#2a2a2a;

    color:white;

    box-sizing:border-box;
}

button{

    width:100%;

    margin-top:18px;

    padding:14px;

    border:none;

    border-radius:12px;

    font-weight:bold;

    background:#d4af37;

    color:black;

    cursor:pointer;
}

h2{
    text-align:center;
}

</style>

</head>

<body>

<form method="POST" class="card">

<h2>💈 Barber Login</h2>

<input
type="text"
name="username"
placeholder="Username"
required
>

<input
type="password"
name="password"
placeholder="Password"
required
>

<button type="submit">
Login
</button>

</form>

</body>
</html>

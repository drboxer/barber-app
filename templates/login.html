<!DOCTYPE html>
<html lang="el">

<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

body{

    margin:0;

    font-family:Arial;

    background:#0f0f0f;

    color:white;

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;
}

.login-box{

    background:#1b1b1b;

    padding:40px;

    border-radius:20px;

    width:320px;

    box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

h1{

    text-align:center;

    margin-bottom:30px;
}

input{

    width:100%;

    box-sizing:border-box;

    padding:14px;

    margin-bottom:15px;

    border:none;

    border-radius:12px;

    background:#2a2a2a;

    color:white;

    font-size:16px;
}

button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    background:linear-gradient(
        135deg,
        #d4af37,
        #f5d76e
    );

    font-size:16px;

    font-weight:bold;

    cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<h1>💈 Barber Login</h1>

<form method="POST">

<input
    type="text"
    name="username"
    placeholder="Username"
    required
>

<input
    type="password"
    name="password"
    placeholder="Password"
    required
>

<button type="submit">
    Login
</button>

</form>

</div>

</body>
</html>
